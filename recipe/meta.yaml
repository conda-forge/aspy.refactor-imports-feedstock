{% set name = "aspy.refactor-imports" %}
{% set version = "2.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace("-", "_") }}-{{ version }}.tar.gz
  sha256: eec8d1a73bedf64ffb8b589ad919a030c1fb14acf7d1ce0ab192f6eedae895c5

build:
  noarch: python
  number: 1
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - cached-property

test:
  requires:
    - python {{ python_min }}
  imports:
    - aspy.refactor_imports

about:
  home: https://github.com/asottile/aspy.refactor_imports
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Utilities for refactoring imports in python-like syntax'

extra:
  recipe-maintainers:
    - scopatz
